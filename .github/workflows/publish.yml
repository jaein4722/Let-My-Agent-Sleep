name: Publish

on:
  push:
    branches:
      - master
    paths:
      - packages/let-my-agent-sleep/package.json
      - .github/workflows/publish.yml
  workflow_dispatch:

concurrency:
  group: publish-let-my-agent-sleep
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Check trusted publishing prerequisites
        run: |
          set -euo pipefail
          node - <<'JS'
          const { execSync } = require("node:child_process")

          const minimums = {
            node: "22.14.0",
            npm: "11.5.1",
          }

          const versions = {
            node: process.versions.node,
            npm: execSync("npm --version", { encoding: "utf8" }).trim(),
          }

          const parse = (version) => {
            const match = /^(\d+)\.(\d+)\.(\d+)/.exec(version)
            if (!match) throw new Error(`unsupported version: ${version}`)
            return match.slice(1, 4).map(Number)
          }

          const isAtLeast = (actual, minimum) => {
            const actualParts = parse(actual)
            const minimumParts = parse(minimum)
            for (let index = 0; index < minimumParts.length; index += 1) {
              if (actualParts[index] > minimumParts[index]) return true
              if (actualParts[index] < minimumParts[index]) return false
            }
            return true
          }

          for (const [name, minimum] of Object.entries(minimums)) {
            if (!isAtLeast(versions[name], minimum)) {
              console.error(`${name} ${versions[name]} does not satisfy npm trusted publishing minimum ${minimum}`)
              process.exit(1)
            }
          }

          console.log(`trusted publishing prerequisites ok: node ${versions.node}, npm ${versions.npm}`)
          JS

      - name: Check patch hygiene
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ -n "$BEFORE_SHA" ] && ! printf '%s' "$BEFORE_SHA" | grep -q '^0\{40\}$'; then
            git diff --check "$BEFORE_SHA..HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Detect release state
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version=$(node -p "require('./packages/let-my-agent-sleep/package.json').version")
          tag="v${version}"

          npm_view_log=$(mktemp)
          if npm view "let-my-agent-sleep@${version}" version > /dev/null 2> "$npm_view_log"; then
            publish_needed=false
          elif grep -q 'E404' "$npm_view_log"; then
            publish_needed=true
          else
            cat "$npm_view_log" >&2
            exit 1
          fi

          gh_release_log=$(mktemp)
          if gh release view "$tag" > /dev/null 2> "$gh_release_log"; then
            release_needed=false
          elif grep -qi 'not found' "$gh_release_log"; then
            release_needed=true
          else
            cat "$gh_release_log" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "publish_needed=$publish_needed"
            echo "release_needed=$release_needed"
          } >> "$GITHUB_OUTPUT"

          echo "version=$version"
          echo "tag=$tag"
          echo "publish_needed=$publish_needed"
          echo "release_needed=$release_needed"

      - name: Check release version and changelog
        if: steps.release.outputs.publish_needed == 'true' || steps.release.outputs.release_needed == 'true'
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"

          if [ "${{ steps.release.outputs.publish_needed }}" = "true" ]; then
            latest=$(npm view let-my-agent-sleep version)

            node -e '
              const [localVersion, latestVersion] = process.argv.slice(1)
              const parseVersion = (version) => {
                const match = /^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/.exec(version)
                if (!match) throw new Error(`unsupported semver version: ${version}`)
                return match.slice(1, 4).map(Number)
              }
              const local = parseVersion(localVersion)
              const latest = parseVersion(latestVersion)
              const comparison = local.findIndex((part, index) => part !== latest[index])
              const isNewer = comparison !== -1 && local[comparison] > latest[comparison]
              if (!isNewer) {
                console.error(`release version ${localVersion} must be newer than npm latest ${latestVersion}`)
                process.exit(1)
              }
            ' "$version" "$latest"
          fi

          for changelog in CHANGELOG.md packages/let-my-agent-sleep/CHANGELOG.md; do
            if ! grep -Fq "## ${version} - " "$changelog"; then
              printf '%s does not contain a dated %s release heading\n' "$changelog" "$version" >&2
              exit 1
            fi
            if grep -Fq "## ${version} - Unreleased" "$changelog"; then
              printf '%s still marks %s as Unreleased\n' "$changelog" "$version" >&2
              exit 1
            fi
          done

      - name: Install tmux
        if: steps.release.outputs.publish_needed == 'true' || steps.release.outputs.release_needed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Check source syntax
        if: steps.release.outputs.publish_needed == 'true' || steps.release.outputs.release_needed == 'true'
        run: npm run test:syntax

      - name: Check site docs
        if: steps.release.outputs.publish_needed == 'true' || steps.release.outputs.release_needed == 'true'
        run: npm run test:site

      - name: Run smoke tests
        if: steps.release.outputs.publish_needed == 'true' || steps.release.outputs.release_needed == 'true'
        run: npm run test:smoke

      - name: Pack dry run
        if: steps.release.outputs.publish_needed == 'true'
        run: npm run pack

      - name: Publish to npm
        if: steps.release.outputs.publish_needed == 'true'
        run: npm publish --workspace let-my-agent-sleep

      - name: Create GitHub release
        if: steps.release.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "let-my-agent-sleep ${{ steps.release.outputs.tag }}" \
            --generate-notes
